services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dr_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  inference:
    build: ./inference-service
    restart: unless-stopped
    ports:
      - "8000:8000"

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      inference:
        condition: service_started
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dr_dashboard
      INFERENCE_URL: http://inference:8000
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pgdata:
  uploads:
